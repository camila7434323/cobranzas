services:
  - type: web
    name: cobranzas-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: npm --prefix backend start
    envVars:
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  - type: static_site
    name: cobranzas-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://cobranzas-backend.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_STORAGE_URL
        sync: false
